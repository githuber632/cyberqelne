version: "3.9"

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: cyberqeln_db
    environment:
      POSTGRES_DB: cyberqeln
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cyberqeln2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for WebSocket clustering and caching)
  redis:
    image: redis:7-alpine
    container_name: cyberqeln_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # NestJS Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberqeln_api
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-cyberqeln2026}@postgres:5432/cyberqeln
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      REDIS_URL: redis://redis:6379
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyberqeln_web
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000/api/v1
      NEXT_PUBLIC_WS_URL: http://backend:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
